<!DOCTYPE html>
<html>
<head>
  <title>MermaidPro Debug</title>
</head>
<body>
  <h1>File Open Test</h1>
  <input type="file" id="fileInput" accept=".mmd,.mermaid" />
  <div id="output"></div>
  
  <script>
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) {
        document.getElementById('output').innerHTML = 'No file selected';
        return;
      }
      
      const reader = new FileReader();
      reader.onerror = () => {
        document.getElementById('output').innerHTML = 'Read error: ' + reader.error;
      };
      reader.onload = () => {
        const content = reader.result;
        document.getElementById('output').innerHTML = `
          <p>File: ${file.name}</p>
          <p>Size: ${file.size} bytes</p>
          <p>Type: ${file.type}</p>
          <p>Content length: ${content.length}</p>
          <pre>${content.substring(0, 200)}</pre>
        `;
      };
      reader.readAsText(file, 'utf-8');
    });
  </script>
</body>
</html>
